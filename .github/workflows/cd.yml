name: CD / FTPS

on:
  workflow_run:
    workflows:
      - CI / Quality
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: cd-ftps-${{ github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: true

jobs:
  preflight-ftps:
    name: Preflight / FTPS (${{ matrix.target }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: >
      (github.event_name == 'workflow_dispatch' &&
       github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       github.event.workflow_run.head_branch == 'main')
    environment: ${{ matrix.environment_name }}
    env:
      FTPS_TARGET_LABEL: ${{ matrix.target }}
      FTPS_SERVER: ${{ secrets[matrix.ftps_server_secret] || vars[matrix.ftps_server_var] || secrets.FTPS_SERVER || vars.FTPS_SERVER }}
      FTPS_PORT: ${{ vars[matrix.ftps_port_var] }}
      FTPS_MODE: ${{ vars[matrix.ftps_mode_var] }}
      FTPS_USERNAME: ${{ secrets[matrix.ftps_username_secret] || vars[matrix.ftps_username_var] || secrets.FTPS_USERNAME || vars.FTPS_USERNAME }}
      FTPS_PASSWORD: ${{ secrets[matrix.ftps_password_secret] || vars[matrix.ftps_password_var] || secrets.FTPS_PASSWORD || vars.FTPS_PASSWORD }}
      FTPS_REMOTE_DIR: ${{ vars[matrix.ftps_remote_dir_var] || secrets[matrix.ftps_remote_dir_secret] || vars.FTPS_REMOTE_DIR || secrets.FTPS_REMOTE_DIR }}
      FTPS_ALLOW_INSECURE_DATA_CHANNEL: ${{ vars[matrix.ftps_allow_insecure_data_channel_var] }}
      FTPS_LFTP_DEBUG_LEVEL: 7
      FTPS_PRUNE_REMOTE: ${{ vars.FTPS_PRUNE_REMOTE }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: datamaq
            environment_name: production
            ftps_server_secret: FTPS_DATAMAQ_SERVER
            ftps_server_var: FTPS_DATAMAQ_SERVER
            ftps_username_secret: FTPS_DATAMAQ_USERNAME
            ftps_username_var: FTPS_DATAMAQ_USERNAME
            ftps_password_secret: FTPS_DATAMAQ_PASSWORD
            ftps_password_var: FTPS_DATAMAQ_PASSWORD
            ftps_remote_dir_secret: FTPS_DATAMAQ_REMOTE_DIR
            ftps_port_var: FTPS_DATAMAQ_PORT
            ftps_mode_var: FTPS_DATAMAQ_MODE
            ftps_remote_dir_var: FTPS_DATAMAQ_REMOTE_DIR
            ftps_allow_insecure_data_channel_var: FTPS_DATAMAQ_ALLOW_INSECURE_DATA_CHANNEL
            health_url: https://datamaq.com.ar

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2 # Node 24 compatible
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Preflight / Validate deploy inputs
        run: bash scripts/ftps-deploy.sh validate
      
      - name: Preflight / Diagnose FTPS env presence
        if: failure()
        run: |
          echo "::group::FTPS env presence"
          echo "environment_name=${{ matrix.environment_name }}"
          for key in FTPS_SERVER FTPS_USERNAME FTPS_PASSWORD FTPS_REMOTE_DIR FTPS_PORT FTPS_MODE FTPS_ALLOW_INSECURE_DATA_CHANNEL; do
            if [ -n "${!key:-}" ]; then
              echo "::notice::${key}=present"
            else
              echo "::warning::${key}=missing"
            fi
          done
          echo "Expected per-target keys:"
          echo "  secrets/vars: ${{ matrix.ftps_server_secret }} | ${{ matrix.ftps_server_var }}"
          echo "  secrets/vars: ${{ matrix.ftps_username_secret }} | ${{ matrix.ftps_username_var }}"
          echo "  secrets/vars: ${{ matrix.ftps_password_secret }} | ${{ matrix.ftps_password_var }}"
          echo "  secret/var:   ${{ matrix.ftps_remote_dir_secret }} | ${{ matrix.ftps_remote_dir_var }}"
          echo "::endgroup::"

      - name: Preflight / Install lftp client
        run: |
          if ! command -v lftp &> /dev/null; then
            sudo apt-get update -qq
            sudo apt-get install -y -qq lftp
          fi

      - name: Preflight / FTPS connectivity and auth
        run: bash scripts/ftps-deploy.sh preflight

      - name: Preflight / Debug context
        if: failure()
        run: |
          echo "::group::Runner environment"
          env | grep -E '^(GITHUB|RUNNER|CI)' || true
          echo "::endgroup::"
          echo "::group::Workspace snapshot"
          pwd
          ls -la
          echo "::endgroup::"

      - name: Preflight / Upload debug artifacts
        if: failure()
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: preflight-debug-${{ matrix.target }}
          path: |
            .tmp-*.log
            .tmp-*.err.log
          if-no-files-found: ignore
          retention-days: 7

  build-artifact:
    name: Build / Artifact (${{ matrix.target }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: preflight-ftps
    if: >
      (github.event_name == 'workflow_dispatch' &&
       github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       github.event.workflow_run.head_branch == 'main')
    environment: ${{ matrix.environment_name }}
    outputs:
      expected_asset: ${{ steps.build-fingerprint.outputs.expected_asset }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: datamaq
            environment_name: production
            ftps_server_secret: FTPS_DATAMAQ_SERVER
            ftps_username_secret: FTPS_DATAMAQ_USERNAME
            ftps_password_secret: FTPS_DATAMAQ_PASSWORD
            ftps_remote_dir_secret: FTPS_DATAMAQ_REMOTE_DIR
            ftps_port_var: FTPS_DATAMAQ_PORT
            ftps_mode_var: FTPS_DATAMAQ_MODE
            ftps_remote_dir_var: FTPS_DATAMAQ_REMOTE_DIR
            ftps_allow_insecure_data_channel_var: FTPS_DATAMAQ_ALLOW_INSECURE_DATA_CHANNEL
            health_url: https://datamaq.com.ar

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2 # Node 24 compatible
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Deploy metadata
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "workflow_run.head_branch=${{ github.event.workflow_run.head_branch }}"
          echo "workflow_run.head_sha=${{ github.event.workflow_run.head_sha }}"
          echo "github.ref=${{ github.ref }}"
          echo "github.sha=${{ github.sha }}"
          git rev-parse --short HEAD

      - name: Build / Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm

      - name: Build / Install dependencies
        run: npm ci

      - name: Build / Dist
        env:
          QUOTE_READ_API_KEYS: ${{ secrets.QUOTE_READ_API_KEYS }}
        run: |
          set -euo pipefail
          export BUILD_OUT_DIR=dist
          npm run build -- ${{ matrix.target }}

      - name: Build / Extract expected asset fingerprint
        id: build-fingerprint
        run: |
          set -euo pipefail
          EXPECTED_ASSET="$(grep -oE 'assets/index-[^"]+\.js' dist/index.html | head -n 1 || true)"
          if [ -z "$EXPECTED_ASSET" ]; then
            echo "No se pudo extraer assets/index-*.js desde dist/index.html"
            exit 1
          fi
          echo "expected_asset=$EXPECTED_ASSET" >> "$GITHUB_OUTPUT"
          echo "Expected asset fingerprint: $EXPECTED_ASSET"

      - name: Upload dist artifact
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: dist-${{ matrix.target }}
          path: dist/
          retention-days: 7

      - name: Upload build debug metadata
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: build-debug-${{ matrix.target }}
          path: |
            dist/index.html
            dist/sitemap.xml
          retention-days: 7

  deploy-ftps:
    name: Deploy / FTPS (${{ matrix.target }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - preflight-ftps
      - build-artifact
    if: >
      (github.event_name == 'workflow_dispatch' &&
       github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       github.event.workflow_run.head_branch == 'main')
    environment: ${{ matrix.environment_name }}
    env:
      FTPS_TARGET_LABEL: ${{ matrix.target }}
      FTPS_SERVER: ${{ secrets[matrix.ftps_server_secret] || vars[matrix.ftps_server_var] || secrets.FTPS_SERVER || vars.FTPS_SERVER }}
      FTPS_PORT: ${{ vars[matrix.ftps_port_var] }}
      FTPS_MODE: ${{ vars[matrix.ftps_mode_var] }}
      FTPS_USERNAME: ${{ secrets[matrix.ftps_username_secret] || vars[matrix.ftps_username_var] || secrets.FTPS_USERNAME || vars.FTPS_USERNAME }}
      FTPS_PASSWORD: ${{ secrets[matrix.ftps_password_secret] || vars[matrix.ftps_password_var] || secrets.FTPS_PASSWORD || vars.FTPS_PASSWORD }}
      FTPS_REMOTE_DIR: ${{ vars[matrix.ftps_remote_dir_var] || secrets[matrix.ftps_remote_dir_secret] || vars.FTPS_REMOTE_DIR || secrets.FTPS_REMOTE_DIR }}
      FTPS_ALLOW_INSECURE_DATA_CHANNEL: ${{ vars[matrix.ftps_allow_insecure_data_channel_var] }}
      FTPS_LFTP_DEBUG_LEVEL: 5
      FTPS_PRUNE_REMOTE: ${{ vars.FTPS_PRUNE_REMOTE }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: datamaq
            environment_name: production
            ftps_server_secret: FTPS_DATAMAQ_SERVER
            ftps_server_var: FTPS_DATAMAQ_SERVER
            ftps_username_secret: FTPS_DATAMAQ_USERNAME
            ftps_username_var: FTPS_DATAMAQ_USERNAME
            ftps_password_secret: FTPS_DATAMAQ_PASSWORD
            ftps_password_var: FTPS_DATAMAQ_PASSWORD
            ftps_remote_dir_secret: FTPS_DATAMAQ_REMOTE_DIR
            ftps_port_var: FTPS_DATAMAQ_PORT
            ftps_mode_var: FTPS_DATAMAQ_MODE
            ftps_remote_dir_var: FTPS_DATAMAQ_REMOTE_DIR
            ftps_allow_insecure_data_channel_var: FTPS_DATAMAQ_ALLOW_INSECURE_DATA_CHANNEL
            health_url: https://datamaq.com.ar

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2 # Node 24 compatible
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Deploy metadata
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "workflow_run.head_branch=${{ github.event.workflow_run.head_branch }}"
          echo "workflow_run.head_sha=${{ github.event.workflow_run.head_sha }}"
          echo "github.ref=${{ github.ref }}"
          echo "github.sha=${{ github.sha }}"
          git rev-parse --short HEAD

      - name: Deploy / Validate deploy inputs
        run: bash scripts/ftps-deploy.sh validate
      
      - name: Deploy / Diagnose FTPS env presence
        if: failure()
        run: |
          echo "::group::FTPS env presence"
          echo "environment_name=${{ matrix.environment_name }}"
          for key in FTPS_SERVER FTPS_USERNAME FTPS_PASSWORD FTPS_REMOTE_DIR FTPS_PORT FTPS_MODE FTPS_ALLOW_INSECURE_DATA_CHANNEL; do
            if [ -n "${!key:-}" ]; then
              echo "::notice::${key}=present"
            else
              echo "::warning::${key}=missing"
            fi
          done
          echo "Expected per-target keys:"
          echo "  secrets/vars: ${{ matrix.ftps_server_secret }} | ${{ matrix.ftps_server_var }}"
          echo "  secrets/vars: ${{ matrix.ftps_username_secret }} | ${{ matrix.ftps_username_var }}"
          echo "  secrets/vars: ${{ matrix.ftps_password_secret }} | ${{ matrix.ftps_password_var }}"
          echo "  secret/var:   ${{ matrix.ftps_remote_dir_secret }} | ${{ matrix.ftps_remote_dir_var }}"
          echo "::endgroup::"

      - name: Deploy / Install lftp client
        run: |
          if ! command -v lftp &> /dev/null; then
            sudo apt-get update -qq
            sudo apt-get install -y -qq lftp
          fi

      - name: Download dist artifact
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: dist-${{ matrix.target }}
          path: dist/

      - name: Deploy dist via FTPS
        run: bash scripts/ftps-deploy.sh upload

      - name: Deploy / Debug context
        if: failure()
        run: |
          echo "::group::Runner environment"
          env | grep -E '^(GITHUB|RUNNER|CI)' || true
          echo "::endgroup::"
          echo "::group::Workspace snapshot"
          pwd
          ls -la
          if [ -d dist ]; then ls -la dist; fi
          echo "::endgroup::"

      - name: Deploy / Upload debug artifacts
        if: failure()
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: deploy-debug-${{ matrix.target }}
          path: |
            dist/index.html
            .tmp-*.log
            .tmp-*.err.log
          if-no-files-found: ignore
          retention-days: 7

  post-deploy-verify:
    name: Post-deploy / Verify (${{ matrix.target }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - build-artifact
      - deploy-ftps
    if: >
      (github.event_name == 'workflow_dispatch' &&
       github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       github.event.workflow_run.head_branch == 'main')
    environment: ${{ matrix.environment_name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: datamaq
            environment_name: production
            cloudflare_api_token_secret: CLOUDFLARE_API_TOKEN
            cloudflare_zone_id_secret: CLOUDFLARE_ZONE_ID
            health_url: https://datamaq.com.ar

    steps:
      - name: Post-deploy / Diagnose Cloudflare env presence
        env:
          CF_API_TOKEN: ${{ secrets[matrix.cloudflare_api_token_secret] }}
          CF_ZONE_ID: ${{ secrets[matrix.cloudflare_zone_id_secret] }}
        run: |
          echo "::group::Cloudflare env presence"
          echo "environment_name=${{ matrix.environment_name }}"
          if [ -n "${CF_API_TOKEN:-}" ]; then
            echo "::notice::CF_API_TOKEN=present"
          else
            echo "::warning::CF_API_TOKEN=missing"
          fi
          if [ -n "${CF_ZONE_ID:-}" ]; then
            echo "::notice::CF_ZONE_ID=present"
          else
            echo "::warning::CF_ZONE_ID=missing"
          fi
          echo "Expected secrets: ${{ matrix.cloudflare_api_token_secret }} and ${{ matrix.cloudflare_zone_id_secret }}"
          echo "::endgroup::"

      - name: Post-deploy / Purge Cloudflare cache
        if: matrix.target == 'datamaq'
        env:
          CF_API_TOKEN: ${{ secrets[matrix.cloudflare_api_token_secret] }}
          CF_ZONE_ID: ${{ secrets[matrix.cloudflare_zone_id_secret] }}
        run: |
          set -euo pipefail
          if [ -z "${CF_API_TOKEN:-}" ] || [ -z "${CF_ZONE_ID:-}" ]; then
            echo "Cloudflare purge required but missing CLOUDFLARE_API_TOKEN or CLOUDFLARE_ZONE_ID."
            echo "Define both secrets in environment 'production'."
            exit 1
          fi

          echo "Purging Cloudflare cache for zone ${CF_ZONE_ID}..."
          curl -fsS -X POST "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}' \
            -o cf-purge-response.json

          if ! grep -q '"success":true' cf-purge-response.json; then
            echo "Cloudflare purge failed."
            cat cf-purge-response.json
            exit 1
          fi

          echo "Cloudflare purge successful."

      - name: Post-deploy / Verify remote index fingerprint
        env:
          DEPLOY_BASE_URL: ${{ matrix.health_url }}
          EXPECTED_ASSET: ${{ needs.build-artifact.outputs.expected_asset }}
        run: |
          set -euo pipefail
          REMOTE_INDEX_URL="${DEPLOY_BASE_URL%/}/?deploy_check=$(date +%s)"
          echo "Fetching remote index: $REMOTE_INDEX_URL"
          curl -fsSL "$REMOTE_INDEX_URL" -o remote-index.html
          if grep -Fq "$EXPECTED_ASSET" remote-index.html; then
            echo "Remote index contains expected fingerprint: $EXPECTED_ASSET"
          else
            echo "Remote index DOES NOT contain expected fingerprint: $EXPECTED_ASSET"
            echo "Potential stale cache or wrong deploy target."
            echo "First asset entries found in remote index:"
            grep -oE 'assets/index-[^"]+\.js' remote-index.html | head -n 5 || true
            exit 1
          fi

      - name: Upload remote index snapshot
        if: always()
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: remote-index-${{ matrix.target }}
          path: remote-index.html
          retention-days: 7

      - name: Post-deploy / Health check
        run: |
          echo "Verifying deployment for ${{ matrix.target }}..."
          curl -Ifs --retry 3 --retry-delay 5 --max-time 20 "${{ matrix.health_url }}"
