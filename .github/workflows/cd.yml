name: CD / SSH

on:
  push:
    branches:
      - main
    paths:
      # Keep direct push trigger only for files ignored by CI,
      # so we avoid duplicate CD runs (push + workflow_run).
      - 'scripts/ssh-deploy.sh'
      - '.github/workflows/cd.yml'
      - '.github/actions/**'
  workflow_run:
    workflows:
      - CI / Quality
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DEPLOY_TARGET: datamaq
  DEPLOY_ENVIRONMENT: production
  DEPLOY_HEALTH_URL: https://datamaq.com.ar
  SSH_HOST: 168.181.184.103
  SSH_PORT: "5932"
  SSH_USER: root
  SSH_REMOTE_DIR: /home/datamaq/public_html

concurrency:
  group: cd-ssh-${{ github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: true

jobs:
  build-artifact:
    name: Build / Artifact (datamaq)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: >
      (github.event_name == 'workflow_dispatch' &&
       github.ref == 'refs/heads/main') ||
      (github.event_name == 'push' &&
       github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       github.event.workflow_run.head_branch == 'main')
    environment: production
    outputs:
      expected_asset: ${{ steps.build-fingerprint.outputs.expected_asset }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2 # Node 24 compatible
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Build / Script fingerprint
        run: |
          echo "Using commit: $(git rev-parse --short HEAD)"
          sha256sum scripts/ssh-deploy.sh
          head -n 20 scripts/ssh-deploy.sh

      - name: Build metadata
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "workflow_run.head_branch=${{ github.event.workflow_run.head_branch }}"
          echo "workflow_run.head_sha=${{ github.event.workflow_run.head_sha }}"
          echo "github.ref=${{ github.ref }}"
          echo "github.sha=${{ github.sha }}"
          git rev-parse --short HEAD

      - name: Build / Setup Node.js
        uses: actions/setup-node@v6.3.0 # Node 24 compatible
        with:
          node-version: 20
          cache: npm

      - name: Build / Install dependencies
        run: npm ci

      - name: Build / Dist
        env:
          QUOTE_READ_API_KEYS: ${{ secrets.QUOTE_READ_API_KEYS || vars.QUOTE_READ_API_KEYS || '' }}
        run: |
          set -euo pipefail
          export BUILD_OUT_DIR=dist
          npm run build -- datamaq

      - name: Build / Extract expected asset fingerprint
        id: build-fingerprint
        run: |
          set -euo pipefail
          EXPECTED_ASSET="$(grep -oE 'assets/index-[^"]+\.js' dist/index.html | head -n 1 || true)"
          if [ -z "$EXPECTED_ASSET" ]; then
            echo "No se pudo extraer assets/index-*.js desde dist/index.html"
            exit 1
          fi
          echo "expected_asset=$EXPECTED_ASSET" >> "$GITHUB_OUTPUT"
          echo "Expected asset fingerprint: $EXPECTED_ASSET"

      - name: Upload dist artifact
        uses: actions/upload-artifact@v7.0.0 # Node 24 compatible
        with:
          name: dist-datamaq
          path: dist/
          retention-days: 7

      - name: Upload build debug metadata
        uses: actions/upload-artifact@v7.0.0 # Node 24 compatible
        with:
          name: build-debug-datamaq
          path: |
            dist/index.html
            dist/sitemap.xml
          retention-days: 7

  deploy-ssh:
    name: Deploy / SSH (datamaq)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - build-artifact
    environment: production
    env:
      SSH_PRIVATE_KEY: ${{ secrets.FTP_SSH_PRIVATE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2 # Node 24 compatible
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Deploy / Validate SSH env presence
        run: |
          echo "::group::SSH env presence"
          for key in SSH_HOST SSH_PORT SSH_USER SSH_REMOTE_DIR SSH_PRIVATE_KEY; do
            if [ -n "${!key:-}" ]; then
              echo "::notice::${key}=present"
            else
              echo "::warning::${key}=missing"
            fi
          done
          echo "::endgroup::"

      - name: Deploy / Install rsync and openssh-client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq rsync openssh-client

      - name: Download dist artifact
        uses: actions/download-artifact@v8.0.1 # Node 24 compatible
        with:
          name: dist-datamaq
          path: dist/

      - name: Deploy dist via SSH
        run: bash scripts/ssh-deploy.sh upload

      - name: Deploy / Debug context
        if: failure()
        run: |
          echo "::group::Runner environment"
          env | grep -E '^(GITHUB|RUNNER|CI|SSH_)' || true
          echo "::endgroup::"
          echo "::group::Workspace snapshot"
          pwd
          ls -la
          if [ -d dist ]; then ls -la dist; fi
          echo "::endgroup::"

      - name: Deploy / Upload debug artifacts
        if: failure()
        uses: actions/upload-artifact@v7.0.0 # Node 24 compatible
        with:
          name: deploy-debug-datamaq
          include-hidden-files: true
          path: |
            dist/index.html
            .tmp-ssh-*.log
          if-no-files-found: ignore
          retention-days: 7

  post-deploy-purge-cloudflare:
    name: Post-deploy / Purge Cloudflare (datamaq)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - build-artifact
      - deploy-ssh
    environment: production

    steps:
      - name: Post-deploy / Diagnose Cloudflare env presence
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
        run: |
          echo "::group::Cloudflare env presence"
          echo "environment_name=${DEPLOY_ENVIRONMENT}"
          if [ -n "${CF_API_TOKEN:-}" ]; then
            echo "::notice::CF_API_TOKEN=present"
          else
            echo "::notice::CF_API_TOKEN=missing"
          fi
          if [ -n "${CF_ZONE_ID:-}" ]; then
            echo "::notice::CF_ZONE_ID=present"
          else
            echo "::notice::CF_ZONE_ID=missing"
          fi
          echo "Expected secrets: CLOUDFLARE_API_TOKEN and CLOUDFLARE_ZONE_ID"
          echo "::endgroup::"

      - name: Post-deploy / Purge Cloudflare cache
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
        run: |
          set -euo pipefail
          if [ -z "${CF_API_TOKEN:-}" ] || [ -z "${CF_ZONE_ID:-}" ]; then
            echo "::notice::Cloudflare purge skipped: missing CLOUDFLARE_API_TOKEN or CLOUDFLARE_ZONE_ID in environment 'production'."
            exit 0
          fi

          echo "Purging Cloudflare cache for zone ${CF_ZONE_ID}..."
          curl -fsS -X POST "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}' \
            -o cf-purge-response.json

          if ! grep -q '"success":true' cf-purge-response.json; then
            echo "Cloudflare purge failed."
            cat cf-purge-response.json
            exit 1
          fi

          echo "Cloudflare purge successful."

  post-deploy-verify-site:
    name: Post-deploy / Verify Site (datamaq)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - build-artifact
      - deploy-ssh
      - post-deploy-purge-cloudflare
    if: >
      always() &&
      needs.build-artifact.result == 'success' &&
      needs.deploy-ssh.result == 'success'

    steps:
      - name: Post-deploy / Verify remote index fingerprint
        env:
          DEPLOY_BASE_URL: ${{ env.DEPLOY_HEALTH_URL }}
          EXPECTED_ASSET: ${{ needs.build-artifact.outputs.expected_asset }}
        run: |
          set -euo pipefail
          REMOTE_INDEX_URL="${DEPLOY_BASE_URL%/}/?deploy_check=$(date +%s)"
          echo "Fetching remote index: $REMOTE_INDEX_URL"
          curl -fsSL "$REMOTE_INDEX_URL" -o remote-index.html
          if grep -Fq "$EXPECTED_ASSET" remote-index.html; then
            echo "Remote index contains expected fingerprint: $EXPECTED_ASSET"
          else
            echo "Remote index DOES NOT contain expected fingerprint: $EXPECTED_ASSET"
            echo "Potential stale cache or wrong deploy target."
            echo "First asset entries found in remote index:"
            grep -oE 'assets/index-[^"]+\.js' remote-index.html | head -n 5 || true
            exit 1
          fi

      - name: Upload remote index snapshot
        if: always()
        uses: actions/upload-artifact@v7.0.0 # Node 24 compatible
        with:
          name: remote-index-datamaq
          path: remote-index.html
          if-no-files-found: ignore
          retention-days: 7

      - name: Post-deploy / Health check
        run: |
          echo "Verifying deployment for ${DEPLOY_TARGET}..."
          curl -Ifs --retry 3 --retry-delay 5 --max-time 20 "${DEPLOY_HEALTH_URL}"
