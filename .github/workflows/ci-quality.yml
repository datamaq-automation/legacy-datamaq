name: CI / Quality

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      run_full_gate:
        description: 'Run full nightly gate (quality:gate)'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: ci-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-fast:
    name: Quality / Fast
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Print toolchain diagnostics
        run: |
          node -v
          npm -v
          git rev-parse --short HEAD

      - name: Run fast quality checks
        run: npm run quality:fast

  quality-e2e-smoke-navigation:
    name: Quality / E2E Smoke (Navigation)
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs:
      - quality-fast

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app (Datamaq)
        run: npm run build:datamaq

      - name: Print E2E diagnostics
        run: |
          node -v
          npm -v
          npx playwright --version
          git rev-parse --short HEAD
          echo "CI=$CI"
          echo "PLAYWRIGHT_MODE=${PLAYWRIGHT_MODE:-<unset>}"
          echo "VITE_API_PROXY_TARGET=${VITE_API_PROXY_TARGET:-<unset>}"
          echo "GITHUB_SHA=$GITHUB_SHA"
          echo "GITHUB_REF=$GITHUB_REF"

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browser (Chromium)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Run smoke E2E (navigation)
        env:
          VITE_PROXY_VERBOSE: 'true'
        run: npm run test:e2e:smoke:navigation

      - name: Print Playwright error contexts
        if: failure()
        run: |
          find test-results -name "error-context.md" -print -exec sed -n '1,200p' {} \; || true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: playwright-report-smoke-navigation
          path: playwright-report/
          retention-days: 7

      - name: Upload Playwright raw results
        if: always()
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: playwright-test-results-smoke-navigation
          path: test-results/
          retention-days: 7

      - name: Upload Vite debug logs
        if: always()
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: vite-logs-smoke-navigation
          path: |
            .tmp-vite-dev.log
            .tmp-vite-dev.err.log
            .tmp-vite-node.log
            .tmp-vite-node.err.log
          retention-days: 7

  quality-e2e-smoke-lead:
    name: Quality / E2E Smoke (Lead)
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs:
      - quality-fast

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app (Datamaq)
        run: npm run build:datamaq

      - name: Print E2E diagnostics
        run: |
          node -v
          npm -v
          npx playwright --version
          git rev-parse --short HEAD
          echo "CI=$CI"
          echo "PLAYWRIGHT_MODE=${PLAYWRIGHT_MODE:-<unset>}"
          echo "VITE_API_PROXY_TARGET=${VITE_API_PROXY_TARGET:-<unset>}"
          echo "GITHUB_SHA=$GITHUB_SHA"
          echo "GITHUB_REF=$GITHUB_REF"

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browser (Chromium)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Run smoke E2E (lead)
        env:
          VITE_PROXY_VERBOSE: 'true'
        run: npm run test:e2e:smoke:lead

      - name: Print Playwright error contexts
        if: failure()
        run: |
          find test-results -name "error-context.md" -print -exec sed -n '1,200p' {} \; || true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: playwright-report-smoke-lead
          path: playwright-report/
          retention-days: 7

      - name: Upload Playwright raw results
        if: always()
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: playwright-test-results-smoke-lead
          path: test-results/
          retention-days: 7

      - name: Upload Vite debug logs
        if: always()
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: vite-logs-smoke-lead
          path: |
            .tmp-vite-dev.log
            .tmp-vite-dev.err.log
            .tmp-vite-node.log
            .tmp-vite-node.err.log
          retention-days: 7

  quality-nightly-gate:
    name: Quality / Nightly Gate
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.run_full_gate)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Print nightly diagnostics
        run: |
          node -v
          npm -v
          git rev-parse --short HEAD
          echo "CI=$CI"
          echo "GITHUB_SHA=$GITHUB_SHA"
          echo "GITHUB_REF=$GITHUB_REF"

      - name: Run full quality gate
        run: npm run quality:gate
