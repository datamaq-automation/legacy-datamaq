name: CI / Quality

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-merge:
    name: Quality / Merge Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser (Chromium)
        run: npx playwright install --with-deps chromium

      - name: Run merge-quality gate
        run: npm run quality:merge

  fastapi-contracts:
    name: Contracts / FastAPI
    if: ${{ vars.FASTAPI_CONTRACT_BASE_URL != '' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run FastAPI contract suite
        env:
          FASTAPI_CONTRACT_BASE_URL: ${{ vars.FASTAPI_CONTRACT_BASE_URL }}
        run: npm run test:contracts:fastapi
