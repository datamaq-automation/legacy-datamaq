name: CI / Quality

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-core:
    name: Quality / Core
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Print toolchain diagnostics
        run: |
          node -v
          npm -v
          git rev-parse --short HEAD

      - name: Run build verification
        run: npm run build:datamaq

      - name: Run typecheck
        run: npm run typecheck

      - name: Run unit tests
        run: npm run test

  quality-e2e-smoke:
    name: Quality / E2E Smoke
    runs-on: ubuntu-latest
    needs:
      - quality-core

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browser (Chromium)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Print E2E diagnostics
        run: |
          node -v
          npm -v
          npx playwright --version
          echo "CI=$CI"
          echo "PLAYWRIGHT_MODE=${PLAYWRIGHT_MODE:-<unset>}"
          echo "VITE_API_PROXY_TARGET=${VITE_API_PROXY_TARGET:-<unset>}"

      - name: Run smoke E2E
        env:
          VITE_PROXY_VERBOSE: 'true'
        run: npm run test:e2e:smoke

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: playwright-report-smoke
          path: playwright-report/
          retention-days: 7

      - name: Upload Playwright raw results
        if: always()
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: playwright-test-results-smoke
          path: test-results/
          retention-days: 7

      - name: Upload Vite debug logs
        if: always()
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: vite-logs-smoke
          path: |
            .tmp-vite-dev.log
            .tmp-vite-dev.err.log
            .tmp-vite-node.log
            .tmp-vite-node.err.log
          retention-days: 7
