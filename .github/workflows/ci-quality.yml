name: CI / Quality

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-quality-gate:
    name: Build / Quality Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run quality checks
        run: |
          npm run lint:brand-hardcodes
          npm run typecheck
          npm run test
          npm run build

  build-smoke-e2e:
    name: Build / Smoke E2E
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser (Chromium)
        run: npx playwright install --with-deps chromium

      - name: Run smoke e2e
        run: npm run test:e2e:smoke

  build-integration-e2e:
    name: Build / Integration E2E (PHP backend)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser (Chromium)
        run: npx playwright install --with-deps chromium

      - name: Verify PHP runtime
        run: php -v

      - name: Start PHP backend and run integration e2e
        run: |
          php -S 127.0.0.1:8899 -t public >/tmp/php-e2e.log 2>&1 &
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8899/api/v1/health >/dev/null; then
              break
            fi
            sleep 1
          done
          VITE_API_PROXY_TARGET=http://127.0.0.1:8899 VITE_API_PROXY_PREFIX= npm run test:e2e:integration
