name: CI / Quality

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      run_full_gate:
        description: 'Run full nightly gate (quality:gate)'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: ci-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-fast:
    name: Quality / Fast
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Setup Node.js and install dependencies
        uses: ./.github/actions/setup-node-npm
        with:
          node-version: "20"

      - name: Print toolchain diagnostics
        run: |
          node -v
          npm -v
          git rev-parse --short HEAD

      - name: Run fast quality checks
        run: npm run quality:fast

  quality-e2e-smoke-navigation:
    name: Quality / E2E Smoke (Navigation)
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs:
      - quality-fast

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Setup Node.js and install dependencies
        uses: ./.github/actions/setup-node-npm
        with:
          node-version: "20"

      - name: Build app (Datamaq)
        env:
          QUOTE_READ_API_KEYS: ${{ secrets.QUOTE_READ_API_KEYS }}
        run: npm run build:datamaq

      - name: Run smoke E2E (navigation) and publish artifacts
        uses: ./.github/actions/playwright-smoke
        with:
          test-command: npm run test:e2e:smoke:navigation
          artifact-suffix: smoke-navigation
          vite-proxy-verbose: "true"

  quality-e2e-smoke-lead:
    name: Quality / E2E Smoke (Lead)
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs:
      - quality-fast

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Setup Node.js and install dependencies
        uses: ./.github/actions/setup-node-npm
        with:
          node-version: "20"

      - name: Build app (Datamaq)
        env:
          QUOTE_READ_API_KEYS: ${{ secrets.QUOTE_READ_API_KEYS }}
        run: npm run build:datamaq

      - name: Run smoke E2E (lead) and publish artifacts
        uses: ./.github/actions/playwright-smoke
        with:
          test-command: npm run test:e2e:smoke:lead
          artifact-suffix: smoke-lead
          vite-proxy-verbose: "true"

  quality-nightly-gate:
    name: Quality / Nightly Gate
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.run_full_gate)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Setup Node.js and install dependencies
        uses: ./.github/actions/setup-node-npm
        with:
          node-version: "20"

      - name: Print nightly diagnostics
        run: |
          node -v
          npm -v
          git rev-parse --short HEAD
          echo "CI=$CI"
          echo "GITHUB_SHA=$GITHUB_SHA"
          echo "GITHUB_REF=$GITHUB_REF"

      - name: Run full quality gate
        run: npm run quality:gate
