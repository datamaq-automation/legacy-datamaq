name: CI / Quality

on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - '.github/workflows/cd.yml'
      - '.github/actions/**'
      - 'scripts/ftps-deploy.sh'
      - 'docs/**'
      - 'README.md'
      - 'AGENTS.md'
      - '.agents/**'
  push:
    branches:
      - main
    paths-ignore:
      - '.github/workflows/cd.yml'
      - '.github/actions/**'
      - 'scripts/ftps-deploy.sh'
      - 'docs/**'
      - 'README.md'
      - 'AGENTS.md'
      - '.agents/**'
  workflow_dispatch:
    inputs:
      run_full_gate:
        description: 'Run full gate (quality:gate)'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ci-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  actionlint:
    name: Actionlint
    if: github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && !inputs.run_full_gate)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2 # Node 24 compatible

      - name: Run actionlint
        uses: raven-actions/actionlint@205b530c5d9fa8f44ae9ed59f341a0db994aa6f8 # v2

      - name: Actionlint / Debug context
        if: failure()
        run: |
          echo "::group::Runner environment"
          env | grep -E '^(GITHUB|RUNNER|CI)' || true
          echo "::endgroup::"
          echo "::group::Workflow files snapshot"
          ls -la .github/workflows || true
          ls -la .github/actions || true
          echo "::endgroup::"
          {
            echo "event_name=${GITHUB_EVENT_NAME}"
            echo "ref=${GITHUB_REF}"
            echo "sha=${GITHUB_SHA}"
          } > .tmp-actionlint-debug.txt

      - name: Actionlint / Upload debug artifacts
        if: failure()
        uses: actions/upload-artifact@v7.0.0 # Node 24 compatible
        with:
          name: actionlint-debug-${{ github.run_id }}
          path: |
            .tmp-actionlint-debug.txt
            .github/workflows/
            .github/actions/
          if-no-files-found: ignore
          retention-days: 7

  quality-fast:
    name: Quality / Fast
    if: github.event_name != 'workflow_dispatch' || !inputs.run_full_gate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2 # Node 24 compatible
        with:
          fetch-depth: 0

      - name: Setup Node.js and install dependencies
        uses: ./.github/actions/setup-node-npm
        with:
          node-version: "20"

      - name: Print toolchain diagnostics
        run: |
          node -v
          npm -v
          git rev-parse --short HEAD

      - name: Run fast quality checks
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            npm run lint:security
            npm run typecheck
          else
            npm run quality:fast
          fi

      - name: Quality fast / Debug context
        if: failure()
        run: |
          echo "::group::Runner environment"
          env | grep -E '^(GITHUB|RUNNER|CI)' || true
          echo "::endgroup::"
          echo "::group::Workspace snapshot"
          pwd
          ls -la
          echo "::endgroup::"
          {
            echo "node=$(node -v 2>/dev/null || true)"
            echo "npm=$(npm -v 2>/dev/null || true)"
            echo "sha=$(git rev-parse --short HEAD 2>/dev/null || true)"
          } > .tmp-quality-fast-debug.txt

      - name: Quality fast / Upload debug artifacts
        if: failure()
        uses: actions/upload-artifact@v7.0.0 # Node 24 compatible
        with:
          name: quality-fast-debug-${{ github.run_id }}
          path: |
            .tmp-quality-fast-debug.txt
            package.json
            package-lock.json
          if-no-files-found: ignore
          retention-days: 7

  changes-e2e-scope:
    name: Changes / E2E Scope
    if: github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && !inputs.run_full_gate)
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.resolve.outputs.should_run }}

    steps:
      - name: Detect changed files (pull_request)
        id: filter
        if: github.event_name == 'pull_request'
        uses: dorny/paths-filter@v3
        with:
          filters: |
            e2e:
              - 'src/**'
              - 'tests/e2e/**'
              - 'playwright.config.ts'
              - 'package.json'
              - 'package-lock.json'
              - 'vite.config.js'
              - '.github/actions/playwright-smoke/**'
              - '.github/workflows/ci.yml'

      - name: Resolve E2E scope
        id: resolve
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          elif [ "${{ steps.filter.outputs.e2e }}" = "true" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

  quality-e2e-smoke:
    name: Quality / E2E Smoke
    if: needs.changes-e2e-scope.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs:
      - quality-fast
      - changes-e2e-scope

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2 # Node 24 compatible
        with:
          fetch-depth: 0

      - name: Setup Node.js and install dependencies
        uses: ./.github/actions/setup-node-npm
        with:
          node-version: "20"

      - name: Build app (Datamaq)
        env:
          QUOTE_READ_API_KEYS: ''
        run: npm run build:datamaq

      - name: Run smoke E2E suite and publish artifacts
        uses: ./.github/actions/playwright-smoke
        with:
          test-command: npm run test:e2e:smoke:navigation && npm run test:e2e:smoke:lead
          artifact-suffix: smoke
          vite-proxy-verbose: "true"

  quality-full-gate:
    name: Quality / Full Gate
    if: github.event_name == 'workflow_dispatch' && inputs.run_full_gate
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2 # Node 24 compatible
        with:
          fetch-depth: 0

      - name: Setup Node.js and install dependencies
        uses: ./.github/actions/setup-node-npm
        with:
          node-version: "20"

      - name: Print nightly diagnostics
        run: |
          node -v
          npm -v
          git rev-parse --short HEAD
          echo "CI=$CI"
          echo "GITHUB_SHA=$GITHUB_SHA"
          echo "GITHUB_REF=$GITHUB_REF"

      - name: Run full quality gate
        run: npm run quality:gate

      - name: Nightly gate / Debug context
        if: failure()
        run: |
          echo "::group::Runner environment"
          env | grep -E '^(GITHUB|RUNNER|CI)' || true
          echo "::endgroup::"
          echo "::group::Workspace snapshot"
          pwd
          ls -la
          echo "::endgroup::"
          {
            echo "node=$(node -v 2>/dev/null || true)"
            echo "npm=$(npm -v 2>/dev/null || true)"
            echo "sha=$(git rev-parse --short HEAD 2>/dev/null || true)"
          } > .tmp-quality-gate-debug.txt

      - name: Nightly gate / Upload debug artifacts
        if: failure()
        uses: actions/upload-artifact@v7.0.0 # Node 24 compatible
        with:
          name: quality-nightly-debug-${{ github.run_id }}
          path: |
            .tmp-quality-gate-debug.txt
            package.json
            package-lock.json
          if-no-files-found: ignore
          retention-days: 7
