name: CD / FTPS

on:
  workflow_run:
    workflows:
      - CI / Quality
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cd-ftps-${{ github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: true

jobs:
  preflight-ftps:
    name: Preflight / FTPS (${{ matrix.target }})
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'workflow_dispatch' &&
       github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       github.event.workflow_run.head_branch == 'main')
    environment: production
    env:
      FTPS_TARGET_LABEL: ${{ matrix.target }}
      FTPS_SERVER: ${{ secrets[matrix.ftps_server_secret] }}
      FTPS_PORT: ${{ vars[matrix.ftps_port_var] }}
      FTPS_MODE: ${{ vars[matrix.ftps_mode_var] }}
      FTPS_USERNAME: ${{ secrets[matrix.ftps_username_secret] }}
      FTPS_PASSWORD: ${{ secrets[matrix.ftps_password_secret] }}
      FTPS_REMOTE_DIR: ${{ vars[matrix.ftps_remote_dir_var] || secrets[matrix.ftps_remote_dir_secret] }}
      FTPS_ALLOW_INSECURE_DATA_CHANNEL: ${{ vars[matrix.ftps_allow_insecure_data_channel_var] }}
      FTPS_LFTP_DEBUG_LEVEL: 7
      FTPS_PRUNE_REMOTE: ${{ vars.FTPS_PRUNE_REMOTE }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: datamaq
            ftps_server_secret: FTPS_DATAMAQ_SERVER
            ftps_username_secret: FTPS_DATAMAQ_USERNAME
            ftps_password_secret: FTPS_DATAMAQ_PASSWORD
            ftps_remote_dir_secret: FTPS_DATAMAQ_REMOTE_DIR
            ftps_port_var: FTPS_DATAMAQ_PORT
            ftps_mode_var: FTPS_DATAMAQ_MODE
            ftps_remote_dir_var: FTPS_DATAMAQ_REMOTE_DIR
            ftps_allow_insecure_data_channel_var: FTPS_DATAMAQ_ALLOW_INSECURE_DATA_CHANNEL
            health_url: https://datamaq.com.ar

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Preflight / Validate deploy inputs
        run: bash scripts/ftps-deploy.sh validate

      - name: Preflight / Install lftp client
        run: |
          if ! command -v lftp &> /dev/null; then
            sudo apt-get update -qq
            sudo apt-get install -y -qq lftp
          fi

      - name: Preflight / FTPS connectivity and auth
        run: bash scripts/ftps-deploy.sh preflight

  build-artifact:
    name: Build / Artifact (${{ matrix.target }})
    runs-on: ubuntu-latest
    needs: preflight-ftps
    if: >
      (github.event_name == 'workflow_dispatch' &&
       github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       github.event.workflow_run.head_branch == 'main')
    environment: production
    outputs:
      expected_asset: ${{ steps.build-fingerprint.outputs.expected_asset }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: datamaq
            ftps_server_secret: FTPS_DATAMAQ_SERVER
            ftps_username_secret: FTPS_DATAMAQ_USERNAME
            ftps_password_secret: FTPS_DATAMAQ_PASSWORD
            ftps_remote_dir_secret: FTPS_DATAMAQ_REMOTE_DIR
            ftps_port_var: FTPS_DATAMAQ_PORT
            ftps_mode_var: FTPS_DATAMAQ_MODE
            ftps_remote_dir_var: FTPS_DATAMAQ_REMOTE_DIR
            ftps_allow_insecure_data_channel_var: FTPS_DATAMAQ_ALLOW_INSECURE_DATA_CHANNEL
            health_url: https://datamaq.com.ar

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Deploy metadata
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "workflow_run.head_branch=${{ github.event.workflow_run.head_branch }}"
          echo "workflow_run.head_sha=${{ github.event.workflow_run.head_sha }}"
          echo "github.ref=${{ github.ref }}"
          echo "github.sha=${{ github.sha }}"
          git rev-parse --short HEAD

      - name: Build / Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Build / Install dependencies
        run: npm ci

      - name: Build / Dist
        run: |
          set -euo pipefail
          export BUILD_OUT_DIR=dist
          npm run build -- ${{ matrix.target }}

      - name: Build / Extract expected asset fingerprint
        id: build-fingerprint
        run: |
          set -euo pipefail
          EXPECTED_ASSET="$(grep -oE 'assets/index-[^"]+\.js' dist/index.html | head -n 1 || true)"
          if [ -z "$EXPECTED_ASSET" ]; then
            echo "No se pudo extraer assets/index-*.js desde dist/index.html"
            exit 1
          fi
          echo "expected_asset=$EXPECTED_ASSET" >> "$GITHUB_OUTPUT"
          echo "Expected asset fingerprint: $EXPECTED_ASSET"

      - name: Upload dist artifact
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: dist-${{ matrix.target }}
          path: dist/
          retention-days: 7

      - name: Upload build debug metadata
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: build-debug-${{ matrix.target }}
          path: |
            dist/index.html
            dist/sitemap.xml
          retention-days: 7

  deploy-ftps:
    name: Deploy / FTPS (${{ matrix.target }})
    runs-on: ubuntu-latest
    needs:
      - preflight-ftps
      - build-artifact
    if: >
      (github.event_name == 'workflow_dispatch' &&
       github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       github.event.workflow_run.head_branch == 'main')
    environment: production
    env:
      FTPS_TARGET_LABEL: ${{ matrix.target }}
      FTPS_SERVER: ${{ secrets[matrix.ftps_server_secret] }}
      FTPS_PORT: ${{ vars[matrix.ftps_port_var] }}
      FTPS_MODE: ${{ vars[matrix.ftps_mode_var] }}
      FTPS_USERNAME: ${{ secrets[matrix.ftps_username_secret] }}
      FTPS_PASSWORD: ${{ secrets[matrix.ftps_password_secret] }}
      FTPS_REMOTE_DIR: ${{ vars[matrix.ftps_remote_dir_var] || secrets[matrix.ftps_remote_dir_secret] }}
      FTPS_ALLOW_INSECURE_DATA_CHANNEL: ${{ vars[matrix.ftps_allow_insecure_data_channel_var] }}
      FTPS_LFTP_DEBUG_LEVEL: 5
      FTPS_PRUNE_REMOTE: ${{ vars.FTPS_PRUNE_REMOTE }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: datamaq
            ftps_server_secret: FTPS_DATAMAQ_SERVER
            ftps_username_secret: FTPS_DATAMAQ_USERNAME
            ftps_password_secret: FTPS_DATAMAQ_PASSWORD
            ftps_remote_dir_secret: FTPS_DATAMAQ_REMOTE_DIR
            ftps_port_var: FTPS_DATAMAQ_PORT
            ftps_mode_var: FTPS_DATAMAQ_MODE
            ftps_remote_dir_var: FTPS_DATAMAQ_REMOTE_DIR
            ftps_allow_insecure_data_channel_var: FTPS_DATAMAQ_ALLOW_INSECURE_DATA_CHANNEL
            health_url: https://datamaq.com.ar

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Deploy metadata
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "workflow_run.head_branch=${{ github.event.workflow_run.head_branch }}"
          echo "workflow_run.head_sha=${{ github.event.workflow_run.head_sha }}"
          echo "github.ref=${{ github.ref }}"
          echo "github.sha=${{ github.sha }}"
          git rev-parse --short HEAD

      - name: Deploy / Validate deploy inputs
        run: bash scripts/ftps-deploy.sh validate

      - name: Deploy / Install lftp client
        run: |
          if ! command -v lftp &> /dev/null; then
            sudo apt-get update -qq
            sudo apt-get install -y -qq lftp
          fi

      - name: Download dist artifact
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: dist-${{ matrix.target }}
          path: dist/

      - name: Deploy dist via FTPS
        run: bash scripts/ftps-deploy.sh upload

  post-deploy-verify:
    name: Post-deploy / Verify (${{ matrix.target }})
    runs-on: ubuntu-latest
    needs:
      - build-artifact
      - deploy-ftps
    if: >
      (github.event_name == 'workflow_dispatch' &&
       github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       github.event.workflow_run.head_branch == 'main')
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: datamaq
            health_url: https://datamaq.com.ar

    steps:
      - name: Post-deploy / Verify remote index fingerprint
        env:
          DEPLOY_BASE_URL: ${{ matrix.health_url }}
          EXPECTED_ASSET: ${{ needs.build-artifact.outputs.expected_asset }}
        run: |
          set -euo pipefail
          REMOTE_INDEX_URL="${DEPLOY_BASE_URL%/}/?deploy_check=$(date +%s)"
          echo "Fetching remote index: $REMOTE_INDEX_URL"
          curl -fsSL "$REMOTE_INDEX_URL" -o remote-index.html
          if grep -Fq "$EXPECTED_ASSET" remote-index.html; then
            echo "Remote index contains expected fingerprint: $EXPECTED_ASSET"
          else
            echo "Remote index DOES NOT contain expected fingerprint: $EXPECTED_ASSET"
            echo "Potential stale cache or wrong deploy target."
            echo "First asset entries found in remote index:"
            grep -oE 'assets/index-[^"]+\.js' remote-index.html | head -n 5 || true
            exit 1
          fi

      - name: Upload remote index snapshot
        if: always()
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: remote-index-${{ matrix.target }}
          path: remote-index.html
          retention-days: 7

      - name: Post-deploy / Health check
        run: |
          echo "Verifying deployment for ${{ matrix.target }}..."
          # Note: We use a generic check here as specific URLs might vary per target.
          # In a real scenario, we would use a target-specific health URL.
          # For now, we just check if the server responds.
          # sleep 5 # Wait for caches to clear if needed
          curl -Ifs --retry 3 --retry-delay 5 "${{ matrix.health_url }}" || echo "Warning: Health check failed or target URL not reachable."
