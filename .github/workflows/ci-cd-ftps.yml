name: CI/CD FTPS

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-todo-sync:
    name: Build / Todo Sync
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate todo sync compliance
        run: node scripts/check-todo-sync.mjs --require-evidence --require-open-p0

  build-quality-gate:
    name: Build / Quality Gate
    runs-on: ubuntu-latest
    needs:
      - build-todo-sync

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run quality gate
        run: npm run quality:gate

  build-smoke-e2e:
    name: Build / Smoke E2E
    runs-on: ubuntu-latest
    needs:
      - build-todo-sync

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser (Chromium)
        run: npx playwright install --with-deps chromium

      - name: Run smoke e2e
        env:
          VITE_BACKEND_BASE_URL: http://127.0.0.1:4173
        run: npm run test:e2e:smoke

  deploy-prepare:
    name: Deploy / Prepare
    runs-on: ubuntu-latest
    needs:
      - build-quality-gate
      - build-smoke-e2e
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Validate deploy inputs
        id: prepare
        env:
          VITE_BACKEND_BASE_URL: ${{ secrets.VITE_BACKEND_BASE_URL }}
          VITE_IS_CONTACT_FORM_ACTIVE: ${{ secrets.VITE_IS_CONTACT_FORM_ACTIVE }}
          VITE_IS_EMAIL_FORM_ACTIVE: ${{ secrets.VITE_IS_EMAIL_FORM_ACTIVE }}
          FTPS_SERVER: ${{ secrets.FTPS_SERVER }}
          FTPS_PORT: ${{ secrets.FTPS_PORT }}
          FTPS_USERNAME: ${{ secrets.FTPS_USERNAME }}
          FTPS_PASSWORD: ${{ secrets.FTPS_PASSWORD }}
          FTPS_REMOTE_DIR: ${{ secrets.FTPS_REMOTE_DIR }}
        run: |
          set -euo pipefail

          BACKEND_BASE_URL="${VITE_BACKEND_BASE_URL:-}"

          if [ -z "${BACKEND_BASE_URL}" ]; then
            echo "::error::Missing secret VITE_BACKEND_BASE_URL"
            exit 1
          fi
          if ! printf '%s' "${BACKEND_BASE_URL}" | grep -Eq '^https://'; then
            echo "::error::Invalid backend base URL. It must start with https://."
            exit 1
          fi

          CONTACT_FORM_ACTIVE="${VITE_IS_CONTACT_FORM_ACTIVE:-false}"
          EMAIL_FORM_ACTIVE="${VITE_IS_EMAIL_FORM_ACTIVE:-false}"
          if ! printf '%s' "${CONTACT_FORM_ACTIVE}" | grep -Eq '^(true|false)$'; then
            echo "::error::Invalid VITE_IS_CONTACT_FORM_ACTIVE. Use true or false."
            exit 1
          fi
          if ! printf '%s' "${EMAIL_FORM_ACTIVE}" | grep -Eq '^(true|false)$'; then
            echo "::error::Invalid VITE_IS_EMAIL_FORM_ACTIVE. Use true or false."
            exit 1
          fi

          if [ -z "${FTPS_SERVER}" ]; then
            echo "::error::Missing secret FTPS_SERVER"
            exit 1
          fi
          if [ -z "${FTPS_USERNAME}" ]; then
            echo "::error::Missing secret FTPS_USERNAME"
            exit 1
          fi
          if [ -z "${FTPS_PASSWORD}" ]; then
            echo "::error::Missing secret FTPS_PASSWORD"
            exit 1
          fi
          if [ -z "${FTPS_REMOTE_DIR}" ]; then
            echo "::error::Missing secret FTPS_REMOTE_DIR"
            exit 1
          fi

          RAW_SERVER="$(printf '%s' "${FTPS_SERVER}" | tr -d '\r\n\t ')"
          RAW_REMOTE_DIR="$(printf '%s' "${FTPS_REMOTE_DIR}" | tr -d '\r\n\t ')"
          SERVER="${RAW_SERVER#ftp://}"
          SERVER="${SERVER#ftps://}"
          SERVER="${SERVER%%/*}"

          SERVER_HOST="${SERVER%%:*}"
          SERVER_PORT_FROM_HOST=""
          if [ "${SERVER_HOST}" != "${SERVER}" ]; then
            SERVER_PORT_FROM_HOST="${SERVER##*:}"
          fi

          PORT="${FTPS_PORT:-${SERVER_PORT_FROM_HOST:-21}}"
          REMOTE_DIR="${RAW_REMOTE_DIR}"

          if [ -z "${SERVER_HOST}" ]; then
            echo "::error::FTPS_SERVER is empty after normalization."
            exit 1
          fi

          if [ -z "${REMOTE_DIR}" ]; then
            echo "::error::FTPS_REMOTE_DIR is empty after normalization."
            exit 1
          fi

          if ! printf '%s' "${PORT}" | grep -Eq '^[0-9]+$'; then
            echo "::error::FTPS port is invalid. Check FTPS_PORT or FTPS_SERVER format."
            exit 1
          fi

          if [ "${REMOTE_DIR#/}" = "${REMOTE_DIR}" ]; then
            REMOTE_DIR="/${REMOTE_DIR}"
          fi

          if printf '%s' "${REMOTE_DIR}" | grep -q '\\'; then
            echo "::error::FTPS_REMOTE_DIR must use Unix-style slashes. Current value is invalid."
            exit 1
          fi

          echo "::notice::Deploy target host=${SERVER_HOST} port=${PORT} remote_dir=${REMOTE_DIR}"

  deploy-build:
    name: Deploy / Build Dist
    runs-on: ubuntu-latest
    needs:
      - deploy-prepare
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_BACKEND_BASE_URL: ${{ secrets.VITE_BACKEND_BASE_URL }}
          VITE_IS_CONTACT_FORM_ACTIVE: ${{ secrets.VITE_IS_CONTACT_FORM_ACTIVE }}
          VITE_IS_EMAIL_FORM_ACTIVE: ${{ secrets.VITE_IS_EMAIL_FORM_ACTIVE }}
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-ftps
          path: dist
          if-no-files-found: error
          retention-days: 1

  deploy-ftps-preflight:
    name: Deploy / FTPS Preflight
    runs-on: ubuntu-latest
    timeout-minutes: 4
    needs:
      - deploy-prepare
      - deploy-build
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Install lftp client
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Validate DNS and remote dir access
        env:
          FTPS_SERVER: ${{ secrets.FTPS_SERVER }}
          FTPS_PORT: ${{ secrets.FTPS_PORT }}
          FTPS_USERNAME: ${{ secrets.FTPS_USERNAME }}
          FTPS_PASSWORD: ${{ secrets.FTPS_PASSWORD }}
          FTPS_REMOTE_DIR: ${{ secrets.FTPS_REMOTE_DIR }}
        run: |
          set -euo pipefail
          RAW_SERVER="$(printf '%s' "${FTPS_SERVER}" | tr -d '\r\n\t ')"
          RAW_REMOTE_DIR="$(printf '%s' "${FTPS_REMOTE_DIR}" | tr -d '\r\n\t ')"
          SERVER="${RAW_SERVER#ftp://}"
          SERVER="${SERVER#ftps://}"
          SERVER="${SERVER%%/*}"

          SERVER_HOST="${SERVER%%:*}"
          SERVER_PORT_FROM_HOST=""
          if [ "${SERVER_HOST}" != "${SERVER}" ]; then
            SERVER_PORT_FROM_HOST="${SERVER##*:}"
          fi

          PORT="${FTPS_PORT:-${SERVER_PORT_FROM_HOST:-21}}"
          REMOTE_DIR="${RAW_REMOTE_DIR}"

          if [ "${REMOTE_DIR#/}" = "${REMOTE_DIR}" ]; then
            REMOTE_DIR="/${REMOTE_DIR}"
          fi

          if ! getent hosts "${SERVER_HOST}" >/dev/null; then
            echo "::error::FTPS_SERVER is not resolvable by DNS. Check secret FTPS_SERVER."
            exit 1
          fi

          timeout 90 lftp -e "set cmd:fail-exit true; set net:timeout 20; set net:max-retries 1; set net:persist-retries 0; set net:reconnect-interval-base 1; set net:reconnect-interval-max 2; set ftp:ssl-force true; set ftp:ssl-protect-data true; set ftp:passive-mode true; set ftp:prefer-epsv false; set ftp:fix-pasv-address true; set ssl:verify-certificate true; set ssl:check-hostname true; open -u \"${FTPS_USERNAME}\",\"${FTPS_PASSWORD}\" -p \"${PORT}\" \"${SERVER_HOST}\"; cd \"${REMOTE_DIR}\"; cls -1; pwd; bye"

  deploy-ftps-upload:
    name: Deploy / FTPS Upload
    runs-on: ubuntu-latest
    timeout-minutes: 6
    needs:
      - deploy-prepare
      - deploy-ftps-preflight
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-ftps
          path: dist

      - name: Install lftp client
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Deploy dist via FTPS
        env:
          FTPS_SERVER: ${{ secrets.FTPS_SERVER }}
          FTPS_PORT: ${{ secrets.FTPS_PORT }}
          FTPS_USERNAME: ${{ secrets.FTPS_USERNAME }}
          FTPS_PASSWORD: ${{ secrets.FTPS_PASSWORD }}
          FTPS_REMOTE_DIR: ${{ secrets.FTPS_REMOTE_DIR }}
        run: |
          set -euo pipefail
          RAW_SERVER="$(printf '%s' "${FTPS_SERVER}" | tr -d '\r\n\t ')"
          RAW_REMOTE_DIR="$(printf '%s' "${FTPS_REMOTE_DIR}" | tr -d '\r\n\t ')"
          SERVER="${RAW_SERVER#ftp://}"
          SERVER="${SERVER#ftps://}"
          SERVER="${SERVER%%/*}"

          SERVER_HOST="${SERVER%%:*}"
          SERVER_PORT_FROM_HOST=""
          if [ "${SERVER_HOST}" != "${SERVER}" ]; then
            SERVER_PORT_FROM_HOST="${SERVER##*:}"
          fi

          PORT="${FTPS_PORT:-${SERVER_PORT_FROM_HOST:-21}}"
          REMOTE_DIR="${RAW_REMOTE_DIR}"

          if [ "${REMOTE_DIR#/}" = "${REMOTE_DIR}" ]; then
            REMOTE_DIR="/${REMOTE_DIR}"
          fi

          echo "::notice::FTPS upload attempt 1/1 (fail-fast mode)"
          LOG_FILE="$(mktemp)"
          LFTP_COMMAND="set cmd:fail-exit true; set net:timeout 20; set net:max-retries 1; set net:persist-retries 0; set net:reconnect-interval-base 1; set net:reconnect-interval-max 2; set ftp:ssl-force true; set ftp:ssl-protect-data true; set ftp:passive-mode true; set ftp:prefer-epsv false; set ftp:fix-pasv-address true; set ssl:verify-certificate true; set ssl:check-hostname true; open -u \"${FTPS_USERNAME}\",\"${FTPS_PASSWORD}\" -p \"${PORT}\" \"${SERVER_HOST}\"; cd \"${REMOTE_DIR}\"; cls -1; set cmd:fail-exit false; rm -f \"w\"; set cmd:fail-exit true; mirror -R --continue --delete --verbose dist .; bye"

          set +e
          timeout 120 lftp -e "${LFTP_COMMAND}" >"${LOG_FILE}" 2>&1
          UPLOAD_STATUS=$?
          set -e

          cat "${LOG_FILE}"

          if [ "${UPLOAD_STATUS}" -eq 0 ]; then
            echo "::notice::FTPS upload completed in single-attempt mode."
            exit 0
          fi

          if [ "${UPLOAD_STATUS}" -eq 124 ]; then
            echo "::error::FTPS upload timed out after 120 seconds."
          fi

          if grep -Eqi 'Login failed|530[[:space:]]' "${LOG_FILE}"; then
            echo "::error::FTPS authentication failed. Validate FTPS_USERNAME/FTPS_PASSWORD."
          fi
          if grep -Eqi 'Name or service not known|Temporary failure in name resolution|Could not resolve host' "${LOG_FILE}"; then
            echo "::error::FTPS server DNS resolution failed. Validate FTPS_SERVER."
          fi
          if grep -Eqi 'certificate|TLS|SSL|handshake|hostname does not match' "${LOG_FILE}"; then
            echo "::error::FTPS TLS validation failed. Validate certificate and hostname."
          fi
          if grep -Eqi 'cd: Access failed|550[[:space:]].*No such file|No such file or directory|Permission denied' "${LOG_FILE}"; then
            echo "::error::FTPS remote path access failed. Validate FTPS_REMOTE_DIR and user permissions."
          fi
          if grep -Eqi 'max-retries exceeded' "${LOG_FILE}"; then
            echo "::error::FTPS reached lftp retry limit (max-retries). This usually indicates PASV/EPSV data-channel blocking or unstable hosting network."
          fi
          if grep -Eqi '425[[:space:]]|Connection refused|Network is unreachable|Connection reset|timed out|max-retries exceeded' "${LOG_FILE}"; then
            echo "::error::FTPS network/data channel failure. Validate passive mode, firewall or hosting stability."
          fi

          echo "::group::FTPS diagnostic matches"
          grep -Ein 'Fatal|error|421|425|426|530|TLS|SSL|handshake|certificate|hostname|timed out|timeout|refused|reset|max-retries|passive|epsv|pasv' "${LOG_FILE}" | tail -n 40 || true
          echo "::endgroup::"
          echo "::group::FTPS failure tail (last 40 lines)"
          tail -n 40 "${LOG_FILE}" || true
          echo "::endgroup::"
          echo "::error::FTPS upload failed in single-attempt mode. Review the diagnostic errors above."
          exit 1
