name: CI/CD FTPS

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-quality-gate:
    name: Build / Quality Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run quality checks
        run: |
          npm run lint:brand-hardcodes
          npm run typecheck
          npm run test
          npm run build

  build-smoke-e2e:
    name: Build / Smoke E2E
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser (Chromium)
        run: npx playwright install --with-deps chromium

      - name: Run smoke e2e
        run: npm run test:e2e:smoke

  deploy-ftps:
    name: Deploy / FTPS (${{ matrix.target }})
    runs-on: ubuntu-latest
    needs:
      - build-quality-gate
      - build-smoke-e2e
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    environment: production
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: datamaq
            ftps_server_secret: FTPS_DATAMAQ_SERVER
            ftps_username_secret: FTPS_DATAMAQ_USERNAME
            ftps_password_secret: FTPS_DATAMAQ_PASSWORD
            ftps_port_var: FTPS_DATAMAQ_PORT
            ftps_remote_dir_var: FTPS_DATAMAQ_REMOTE_DIR
            ftps_allow_insecure_data_channel_var: FTPS_DATAMAQ_ALLOW_INSECURE_DATA_CHANNEL
          - target: upp
            ftps_server_secret: FTPS_UPP_SERVER
            ftps_username_secret: FTPS_UPP_USERNAME
            ftps_password_secret: FTPS_UPP_PASSWORD
            ftps_port_var: FTPS_UPP_PORT
            ftps_remote_dir_var: FTPS_UPP_REMOTE_DIR
            ftps_allow_insecure_data_channel_var: FTPS_UPP_ALLOW_INSECURE_DATA_CHANNEL

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate deploy inputs
        env:
          FTPS_SERVER: ${{ secrets[matrix.ftps_server_secret] }}
          FTPS_PORT: ${{ vars[matrix.ftps_port_var] }}
          FTPS_USERNAME: ${{ secrets[matrix.ftps_username_secret] }}
          FTPS_PASSWORD: ${{ secrets[matrix.ftps_password_secret] }}
          FTPS_REMOTE_DIR: ${{ vars[matrix.ftps_remote_dir_var] }}
        run: |
          set -euo pipefail

          if [ -z "${FTPS_SERVER}" ]; then
            echo "::error::Missing secret ${{ matrix.ftps_server_secret }}"
            exit 1
          fi
          if [ -z "${FTPS_USERNAME}" ]; then
            echo "::error::Missing secret ${{ matrix.ftps_username_secret }}"
            exit 1
          fi
          if [ -z "${FTPS_PASSWORD}" ]; then
            echo "::error::Missing secret ${{ matrix.ftps_password_secret }}"
            exit 1
          fi
          if [ -z "${FTPS_REMOTE_DIR}" ]; then
            echo "::error::Missing variable ${{ matrix.ftps_remote_dir_var }}"
            exit 1
          fi

          RAW_SERVER="$(printf '%s' "${FTPS_SERVER}" | tr -d '\r\n\t ')"
          RAW_REMOTE_DIR="$(printf '%s' "${FTPS_REMOTE_DIR}" | tr -d '\r\n\t ')"
          SERVER="${RAW_SERVER#ftp://}"
          SERVER="${SERVER#ftps://}"
          SERVER="${SERVER%%/*}"
          SERVER_HOST="${SERVER%%:*}"
          SERVER_PORT_FROM_HOST=""
          if [ "${SERVER_HOST}" != "${SERVER}" ]; then
            SERVER_PORT_FROM_HOST="${SERVER##*:}"
          fi

          PORT="${FTPS_PORT:-${SERVER_PORT_FROM_HOST:-21}}"
          REMOTE_DIR="${RAW_REMOTE_DIR}"
          if [ "${REMOTE_DIR#/}" = "${REMOTE_DIR}" ]; then
            REMOTE_DIR="/${REMOTE_DIR}"
          fi

          if [ -z "${SERVER_HOST}" ]; then
            echo "::error::FTPS server is empty after normalization."
            exit 1
          fi
          if ! printf '%s' "${PORT}" | grep -Eq '^[0-9]+$'; then
            echo "::error::FTPS port is invalid."
            exit 1
          fi
          if printf '%s' "${REMOTE_DIR}" | grep -q '\\'; then
            echo "::error::FTPS remote dir must use Unix-style slashes."
            exit 1
          fi

          echo "::notice::Deploy target=${{ matrix.target }} host=${SERVER_HOST} port=${PORT} dir=${REMOTE_DIR}"

      - name: Build dist
        run: |
          set -euo pipefail
          export BUILD_OUT_DIR=dist
          npm run build -- ${{ matrix.target }}

      - name: Install lftp client
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: FTPS preflight
        env:
          FTPS_SERVER: ${{ secrets[matrix.ftps_server_secret] }}
          FTPS_PORT: ${{ vars[matrix.ftps_port_var] }}
          FTPS_USERNAME: ${{ secrets[matrix.ftps_username_secret] }}
          FTPS_PASSWORD: ${{ secrets[matrix.ftps_password_secret] }}
          FTPS_REMOTE_DIR: ${{ vars[matrix.ftps_remote_dir_var] }}
        run: |
          set -euo pipefail
          RAW_SERVER="$(printf '%s' "${FTPS_SERVER}" | tr -d '\r\n\t ')"
          RAW_REMOTE_DIR="$(printf '%s' "${FTPS_REMOTE_DIR}" | tr -d '\r\n\t ')"
          SERVER="${RAW_SERVER#ftp://}"
          SERVER="${SERVER#ftps://}"
          SERVER="${SERVER%%/*}"

          SERVER_HOST="${SERVER%%:*}"
          SERVER_PORT_FROM_HOST=""
          if [ "${SERVER_HOST}" != "${SERVER}" ]; then
            SERVER_PORT_FROM_HOST="${SERVER##*:}"
          fi
          PORT="${FTPS_PORT:-${SERVER_PORT_FROM_HOST:-21}}"
          REMOTE_DIR="${RAW_REMOTE_DIR}"
          if [ "${REMOTE_DIR#/}" = "${REMOTE_DIR}" ]; then
            REMOTE_DIR="/${REMOTE_DIR}"
          fi

          if ! getent hosts "${SERVER_HOST}" >/dev/null; then
            echo "::error::FTPS server is not resolvable by DNS."
            exit 1
          fi

          run_preflight_attempt() {
            ATTEMPT="$1"
            PREFER_EPSV="$2"
            FIX_PASV_ADDRESS="$3"
            LOG_FILE="$(mktemp)"
            LFTP_COMMAND="set cmd:fail-exit true; set net:timeout 20; set net:max-retries 1; set net:persist-retries 0; set ftp:ssl-force true; set ftp:ssl-protect-data true; set ftp:passive-mode true; set ftp:prefer-epsv ${PREFER_EPSV}; set ftp:fix-pasv-address ${FIX_PASV_ADDRESS}; set ssl:verify-certificate true; set ssl:check-hostname true; open -u \"${FTPS_USERNAME}\",\"${FTPS_PASSWORD}\" -p \"${PORT}\" \"${SERVER_HOST}\"; cd \"${REMOTE_DIR}\"; cls -1; pwd; bye"

            echo "::notice::Preflight attempt ${ATTEMPT} for target=${{ matrix.target }}"
            set +e
            timeout 90 lftp -e "${LFTP_COMMAND}" >"${LOG_FILE}" 2>&1
            STATUS=$?
            set -e

            cat "${LOG_FILE}"
            if [ "${STATUS}" -eq 0 ]; then
              return 0
            fi
            return 1
          }

          if run_preflight_attempt 1 false true; then
            exit 0
          fi
          if run_preflight_attempt 2 true false; then
            exit 0
          fi

          echo "::error::FTPS preflight failed for target=${{ matrix.target }}"
          exit 1

      - name: Deploy dist via FTPS
        env:
          FTPS_SERVER: ${{ secrets[matrix.ftps_server_secret] }}
          FTPS_PORT: ${{ vars[matrix.ftps_port_var] }}
          FTPS_USERNAME: ${{ secrets[matrix.ftps_username_secret] }}
          FTPS_PASSWORD: ${{ secrets[matrix.ftps_password_secret] }}
          FTPS_REMOTE_DIR: ${{ vars[matrix.ftps_remote_dir_var] }}
          FTPS_ALLOW_INSECURE_DATA_CHANNEL: ${{ vars[matrix.ftps_allow_insecure_data_channel_var] }}
        run: |
          set -euo pipefail
          RAW_SERVER="$(printf '%s' "${FTPS_SERVER}" | tr -d '\r\n\t ')"
          RAW_REMOTE_DIR="$(printf '%s' "${FTPS_REMOTE_DIR}" | tr -d '\r\n\t ')"
          SERVER="${RAW_SERVER#ftp://}"
          SERVER="${SERVER#ftps://}"
          SERVER="${SERVER%%/*}"

          SERVER_HOST="${SERVER%%:*}"
          SERVER_PORT_FROM_HOST=""
          if [ "${SERVER_HOST}" != "${SERVER}" ]; then
            SERVER_PORT_FROM_HOST="${SERVER##*:}"
          fi
          PORT="${FTPS_PORT:-${SERVER_PORT_FROM_HOST:-21}}"
          REMOTE_DIR="${RAW_REMOTE_DIR}"
          if [ "${REMOTE_DIR#/}" = "${REMOTE_DIR}" ]; then
            REMOTE_DIR="/${REMOTE_DIR}"
          fi

          ALLOW_INSECURE_DATA_CHANNEL="${FTPS_ALLOW_INSECURE_DATA_CHANNEL:-false}"
          if ! printf '%s' "${ALLOW_INSECURE_DATA_CHANNEL}" | grep -Eq '^(true|false)$'; then
            echo "::error::FTPS_ALLOW_INSECURE_DATA_CHANNEL must be true or false."
            exit 1
          fi

          run_upload_attempt() {
            ATTEMPT="$1"
            PREFER_EPSV="$2"
            FIX_PASV_ADDRESS="$3"
            SSL_PROTECT_DATA="$4"
            LOG_FILE="$(mktemp)"
            LFTP_COMMAND="set cmd:fail-exit true; set net:timeout 20; set net:max-retries 1; set net:persist-retries 0; set ftp:ssl-force true; set ftp:ssl-protect-data ${SSL_PROTECT_DATA}; set ftp:passive-mode true; set ftp:prefer-epsv ${PREFER_EPSV}; set ftp:fix-pasv-address ${FIX_PASV_ADDRESS}; set ssl:verify-certificate true; set ssl:check-hostname true; open -u \"${FTPS_USERNAME}\",\"${FTPS_PASSWORD}\" -p \"${PORT}\" \"${SERVER_HOST}\"; cd \"${REMOTE_DIR}\"; mirror -R --continue --delete --verbose dist .; bye"

            echo "::notice::Upload attempt ${ATTEMPT} for target=${{ matrix.target }}"
            set +e
            timeout 120 lftp -e "${LFTP_COMMAND}" >"${LOG_FILE}" 2>&1
            STATUS=$?
            set -e

            cat "${LOG_FILE}"
            if [ "${STATUS}" -eq 0 ]; then
              return 0
            fi
            return 1
          }

          if run_upload_attempt 1 false true true; then
            exit 0
          fi
          if run_upload_attempt 2 true false true; then
            exit 0
          fi

          if [ "${ALLOW_INSECURE_DATA_CHANNEL}" = "true" ]; then
            echo "::warning::Using insecure data-channel fallback (ssl-protect-data=false)"
            if run_upload_attempt 3 false true false; then
              exit 0
            fi
          fi

          echo "::error::FTPS upload failed for target=${{ matrix.target }}"
          exit 1
