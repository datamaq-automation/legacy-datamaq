name: CI/CD FTPS

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  todo-sync:
    name: Todo Sync
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate todo sync compliance
        run: node scripts/check-todo-sync.mjs --require-evidence --require-open-p0

  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs:
      - todo-sync

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run quality gate
        run: npm run quality:gate

  smoke-e2e:
    name: Smoke E2E
    runs-on: ubuntu-latest
    needs:
      - todo-sync

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser (Chromium)
        run: npx playwright install --with-deps chromium

      - name: Run smoke e2e
        run: npm run test:e2e:smoke

  deploy-production:
    name: Deploy Production (FTPS)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - quality-gate
      - smoke-e2e
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install lftp client
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Validate required secrets
        env:
          FTPS_SERVER: ${{ secrets.FTPS_SERVER }}
          FTPS_USERNAME: ${{ secrets.FTPS_USERNAME }}
          FTPS_PASSWORD: ${{ secrets.FTPS_PASSWORD }}
          FTPS_REMOTE_DIR: ${{ secrets.FTPS_REMOTE_DIR }}
        run: |
          set -euo pipefail

          if [ -z "${FTPS_SERVER}" ]; then
            echo "::error::Missing secret FTPS_SERVER"
            exit 1
          fi
          if [ -z "${FTPS_USERNAME}" ]; then
            echo "::error::Missing secret FTPS_USERNAME"
            exit 1
          fi
          if [ -z "${FTPS_PASSWORD}" ]; then
            echo "::error::Missing secret FTPS_PASSWORD"
            exit 1
          fi
          if [ -z "${FTPS_REMOTE_DIR}" ]; then
            echo "::error::Missing secret FTPS_REMOTE_DIR"
            exit 1
          fi

      - name: Deploy dist via FTPS
        env:
          FTPS_SERVER: ${{ secrets.FTPS_SERVER }}
          FTPS_PORT: ${{ secrets.FTPS_PORT }}
          FTPS_USERNAME: ${{ secrets.FTPS_USERNAME }}
          FTPS_PASSWORD: ${{ secrets.FTPS_PASSWORD }}
          FTPS_REMOTE_DIR: ${{ secrets.FTPS_REMOTE_DIR }}
        run: |
          set -euo pipefail

          RAW_SERVER="$(printf '%s' "${FTPS_SERVER}" | tr -d '\r\n\t ')"
          SERVER="${RAW_SERVER#ftp://}"
          SERVER="${SERVER#ftps://}"
          SERVER="${SERVER%%/*}"

          SERVER_HOST="${SERVER%%:*}"
          SERVER_PORT_FROM_HOST=""
          if [ "${SERVER_HOST}" != "${SERVER}" ]; then
            SERVER_PORT_FROM_HOST="${SERVER##*:}"
          fi

          PORT="${FTPS_PORT:-${SERVER_PORT_FROM_HOST:-21}}"

          if [ -z "${SERVER_HOST}" ]; then
            echo "::error::FTPS_SERVER is empty after normalization."
            exit 1
          fi

          if ! printf '%s' "${PORT}" | grep -Eq '^[0-9]+$'; then
            echo "::error::FTPS port is invalid. Check FTPS_PORT or FTPS_SERVER format."
            exit 1
          fi

          if ! getent hosts "${SERVER_HOST}" >/dev/null; then
            echo "::error::FTPS_SERVER is not resolvable by DNS. Check secret FTPS_SERVER."
            exit 1
          fi

          timeout 900 lftp <<EOF
          set cmd:fail-exit true
          set net:timeout 20
          set net:max-retries 2
          set net:reconnect-interval-base 5
          set net:reconnect-interval-max 20
          set ftp:ssl-force true
          set ftp:ssl-protect-data true
          set ftp:passive-mode true
          set ssl:verify-certificate true
          set ssl:check-hostname true
          open -u "${FTPS_USERNAME}","${FTPS_PASSWORD}" -p "${PORT}" "${SERVER_HOST}"
          mkdir -p "${FTPS_REMOTE_DIR}"
          mirror -R --delete --verbose dist "${FTPS_REMOTE_DIR}"
          bye
          EOF
