name: CI/CD FTPS

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-todo-sync:
    name: Build / Todo Sync
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate todo sync compliance
        run: node scripts/check-todo-sync.mjs --require-evidence --require-open-p0

  build-quality-gate:
    name: Build / Quality Gate
    runs-on: ubuntu-latest
    needs:
      - build-todo-sync

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run quality gate
        run: npm run quality:gate

  build-smoke-e2e:
    name: Build / Smoke E2E
    runs-on: ubuntu-latest
    needs:
      - build-todo-sync

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser (Chromium)
        run: npx playwright install --with-deps chromium

      - name: Run smoke e2e
        env:
          VITE_BACKEND_BASE_URL: http://127.0.0.1:4173
        run: npm run test:e2e:smoke

  deploy-prepare:
    name: Deploy / Prepare
    runs-on: ubuntu-latest
    needs:
      - build-quality-gate
      - build-smoke-e2e
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Validate deploy inputs
        id: prepare
        env:
          VITE_BACKEND_BASE_URL: ${{ secrets.VITE_BACKEND_BASE_URL }}
          FTPS_SERVER: ${{ secrets.FTPS_SERVER }}
          FTPS_PORT: ${{ secrets.FTPS_PORT }}
          FTPS_USERNAME: ${{ secrets.FTPS_USERNAME }}
          FTPS_PASSWORD: ${{ secrets.FTPS_PASSWORD }}
          FTPS_REMOTE_DIR: ${{ secrets.FTPS_REMOTE_DIR }}
        run: |
          set -euo pipefail

          BACKEND_BASE_URL="${VITE_BACKEND_BASE_URL:-}"

          if [ -z "${BACKEND_BASE_URL}" ]; then
            echo "::error::Missing secret VITE_BACKEND_BASE_URL"
            exit 1
          fi
          if ! printf '%s' "${BACKEND_BASE_URL}" | grep -Eq '^https://'; then
            echo "::error::Invalid backend base URL. It must start with https://."
            exit 1
          fi

          if [ -z "${FTPS_SERVER}" ]; then
            echo "::error::Missing secret FTPS_SERVER"
            exit 1
          fi
          if [ -z "${FTPS_USERNAME}" ]; then
            echo "::error::Missing secret FTPS_USERNAME"
            exit 1
          fi
          if [ -z "${FTPS_PASSWORD}" ]; then
            echo "::error::Missing secret FTPS_PASSWORD"
            exit 1
          fi
          if [ -z "${FTPS_REMOTE_DIR}" ]; then
            echo "::error::Missing secret FTPS_REMOTE_DIR"
            exit 1
          fi

          RAW_SERVER="$(printf '%s' "${FTPS_SERVER}" | tr -d '\r\n\t ')"
          RAW_REMOTE_DIR="$(printf '%s' "${FTPS_REMOTE_DIR}" | tr -d '\r\n\t ')"
          SERVER="${RAW_SERVER#ftp://}"
          SERVER="${SERVER#ftps://}"
          SERVER="${SERVER%%/*}"

          SERVER_HOST="${SERVER%%:*}"
          SERVER_PORT_FROM_HOST=""
          if [ "${SERVER_HOST}" != "${SERVER}" ]; then
            SERVER_PORT_FROM_HOST="${SERVER##*:}"
          fi

          PORT="${FTPS_PORT:-${SERVER_PORT_FROM_HOST:-21}}"
          REMOTE_DIR="${RAW_REMOTE_DIR}"

          if [ -z "${SERVER_HOST}" ]; then
            echo "::error::FTPS_SERVER is empty after normalization."
            exit 1
          fi

          if [ -z "${REMOTE_DIR}" ]; then
            echo "::error::FTPS_REMOTE_DIR is empty after normalization."
            exit 1
          fi

          if ! printf '%s' "${PORT}" | grep -Eq '^[0-9]+$'; then
            echo "::error::FTPS port is invalid. Check FTPS_PORT or FTPS_SERVER format."
            exit 1
          fi

          if [ "${REMOTE_DIR#/}" = "${REMOTE_DIR}" ]; then
            REMOTE_DIR="/${REMOTE_DIR}"
          fi

          if printf '%s' "${REMOTE_DIR}" | grep -q '\\'; then
            echo "::error::FTPS_REMOTE_DIR must use Unix-style slashes. Current value is invalid."
            exit 1
          fi

          echo "::notice::Deploy target host=${SERVER_HOST} port=${PORT} remote_dir=${REMOTE_DIR}"

  deploy-build:
    name: Deploy / Build Dist
    runs-on: ubuntu-latest
    needs:
      - deploy-prepare
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_BACKEND_BASE_URL: ${{ secrets.VITE_BACKEND_BASE_URL }}
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-ftps
          path: dist
          if-no-files-found: error
          retention-days: 1

  deploy-ftps-preflight:
    name: Deploy / FTPS Preflight
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - deploy-prepare
      - deploy-build
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Install lftp client
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Validate DNS and remote dir access
        env:
          FTPS_SERVER: ${{ secrets.FTPS_SERVER }}
          FTPS_PORT: ${{ secrets.FTPS_PORT }}
          FTPS_USERNAME: ${{ secrets.FTPS_USERNAME }}
          FTPS_PASSWORD: ${{ secrets.FTPS_PASSWORD }}
          FTPS_REMOTE_DIR: ${{ secrets.FTPS_REMOTE_DIR }}
        run: |
          set -euo pipefail
          RAW_SERVER="$(printf '%s' "${FTPS_SERVER}" | tr -d '\r\n\t ')"
          RAW_REMOTE_DIR="$(printf '%s' "${FTPS_REMOTE_DIR}" | tr -d '\r\n\t ')"
          SERVER="${RAW_SERVER#ftp://}"
          SERVER="${SERVER#ftps://}"
          SERVER="${SERVER%%/*}"

          SERVER_HOST="${SERVER%%:*}"
          SERVER_PORT_FROM_HOST=""
          if [ "${SERVER_HOST}" != "${SERVER}" ]; then
            SERVER_PORT_FROM_HOST="${SERVER##*:}"
          fi

          PORT="${FTPS_PORT:-${SERVER_PORT_FROM_HOST:-21}}"
          REMOTE_DIR="${RAW_REMOTE_DIR}"

          if [ "${REMOTE_DIR#/}" = "${REMOTE_DIR}" ]; then
            REMOTE_DIR="/${REMOTE_DIR}"
          fi

          if ! getent hosts "${SERVER_HOST}" >/dev/null; then
            echo "::error::FTPS_SERVER is not resolvable by DNS. Check secret FTPS_SERVER."
            exit 1
          fi

          timeout 180 lftp -e "set cmd:fail-exit true; set net:timeout 20; set net:max-retries 2; set net:reconnect-interval-base 5; set net:reconnect-interval-max 20; set ftp:ssl-force true; set ftp:ssl-protect-data true; set ftp:passive-mode true; set ssl:verify-certificate true; set ssl:check-hostname true; open -u \"${FTPS_USERNAME}\",\"${FTPS_PASSWORD}\" -p \"${PORT}\" \"${SERVER_HOST}\"; cd \"${REMOTE_DIR}\"; pwd; bye"

  deploy-ftps-upload:
    name: Deploy / FTPS Upload
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - deploy-prepare
      - deploy-ftps-preflight
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-ftps
          path: dist

      - name: Install lftp client
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Deploy dist via FTPS
        env:
          FTPS_SERVER: ${{ secrets.FTPS_SERVER }}
          FTPS_PORT: ${{ secrets.FTPS_PORT }}
          FTPS_USERNAME: ${{ secrets.FTPS_USERNAME }}
          FTPS_PASSWORD: ${{ secrets.FTPS_PASSWORD }}
          FTPS_REMOTE_DIR: ${{ secrets.FTPS_REMOTE_DIR }}
        run: |
          set -euo pipefail
          RAW_SERVER="$(printf '%s' "${FTPS_SERVER}" | tr -d '\r\n\t ')"
          RAW_REMOTE_DIR="$(printf '%s' "${FTPS_REMOTE_DIR}" | tr -d '\r\n\t ')"
          SERVER="${RAW_SERVER#ftp://}"
          SERVER="${SERVER#ftps://}"
          SERVER="${SERVER%%/*}"

          SERVER_HOST="${SERVER%%:*}"
          SERVER_PORT_FROM_HOST=""
          if [ "${SERVER_HOST}" != "${SERVER}" ]; then
            SERVER_PORT_FROM_HOST="${SERVER##*:}"
          fi

          PORT="${FTPS_PORT:-${SERVER_PORT_FROM_HOST:-21}}"
          REMOTE_DIR="${RAW_REMOTE_DIR}"

          if [ "${REMOTE_DIR#/}" = "${REMOTE_DIR}" ]; then
            REMOTE_DIR="/${REMOTE_DIR}"
          fi

          ATTEMPT=1
          MAX_ATTEMPTS=3

          until [ "${ATTEMPT}" -gt "${MAX_ATTEMPTS}" ]; do
            echo "::notice::FTPS upload attempt ${ATTEMPT}/${MAX_ATTEMPTS}"
            if timeout 900 lftp -e "set cmd:fail-exit true; set net:timeout 30; set net:max-retries 5; set net:persist-retries 1; set net:reconnect-interval-base 5; set net:reconnect-interval-max 30; set ftp:ssl-force true; set ftp:ssl-protect-data true; set ftp:passive-mode true; set ssl:verify-certificate true; set ssl:check-hostname true; open -u \"${FTPS_USERNAME}\",\"${FTPS_PASSWORD}\" -p \"${PORT}\" \"${SERVER_HOST}\"; mirror -R --continue --delete --verbose dist \"${REMOTE_DIR}\"; bye"
            then
              echo "::notice::FTPS upload completed on attempt ${ATTEMPT}"
              exit 0
            fi

            if [ "${ATTEMPT}" -eq "${MAX_ATTEMPTS}" ]; then
              echo "::error::FTPS upload failed after ${MAX_ATTEMPTS} attempts."
              exit 1
            fi

            ATTEMPT=$((ATTEMPT + 1))
            echo "::warning::FTPS upload attempt failed. Retrying in 15 seconds..."
            sleep 15
          done
