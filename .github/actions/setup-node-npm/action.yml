name: Setup Node and npm ci
description: Set up Node.js with npm cache and install dependencies via npm ci.

inputs:
  node-version:
    description: Node.js version to install.
    required: false
    default: "20"

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v6.3.0 # Node 24 compatible
      with:
        node-version: ${{ inputs.node-version }}
        cache: npm

    - name: Install dependencies
      shell: bash
      run: npm ci
