name: 'Debug Wrapper'
description: 'Adds debugging capabilities to any job step'

inputs:
  debug:
    description: 'Enable debug mode'
    required: false
    default: 'false'
  step-name:
    description: 'Name of the step being wrapped'
    required: true
  artifact-path:
    description: 'Path to upload on failure'
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Pre-step diagnostics
      shell: bash
      run: |
        echo "::group::Step diagnostics - ${{ inputs.step-name }}"
        echo "Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
        echo "Working directory: $(pwd)"
        echo "Debug mode: ${{ inputs.debug }}"
        echo "::endgroup::"

    - name: Disk usage before
      shell: bash
      run: |
        echo "::group::Disk usage (before)"
        df -h
        echo "::endgroup::"

    - name: Step execution placeholder
      shell: bash
      run: |
        echo "Execute your actual step here"
        # This is a template - replace with actual step logic

    - name: Post-step diagnostics
      if: failure() || inputs.debug == 'true'
      shell: bash
      run: |
        echo "::group::Failure diagnostics - ${{ inputs.step-name }}"
        echo "Exit code: $?"
        echo "Recent logs:"
        tail -n 100 *.log 2>/dev/null || true
        echo "::endgroup::"

        echo "::group::Process state"
        ps aux || true
        echo "::endgroup::"

        echo "::group::Disk usage (after)"
        df -h
        du -sh . 2>/dev/null || true
        echo "::endgroup::"

    - name: Upload debug artifacts
      if: failure() || inputs.debug == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: debug-${{ inputs.step-name }}-${{ github.run_id }}
        path: |
          ${{ inputs.artifact-path }}
          *.log
        retention-days: 7
